[package]
name = "zkmove-cli"
version = "0.3.0"
authors = ["Guangyu Zhu <guangyuz@gmail.com>"]
edition = "2018"

[dependencies]
error = { path = "../common/error" }
functional-tests = { path = "../functional-tests" }
logger = { path = "../common/logger" }
movelang = { path = "../movelang" }
types = { path = "../common/types" }
halo2_proofs = { git = "https://github.com/privacy-scaling-explorations/halo2.git", tag = "v2023_04_20" }
move-binary-format = { git = "https://github.com/young-rocks/move", rev = "b036995a" }
rand = "0.8"
structopt = "0.3.25"
hex = { version = "0.4.3" }
anyhow = { version = "1" }
serde_json = "1"
serde = { version = "1", features=["derive"] }
vm = { path = "../vm" }
vm-circuit = { path = "../vm-circuit" }
circuit-info-generator = {path = "../../halo2-verifier.move/crates/circuit-info-generator", optional=true}

[dev-dependencies]


[features]
example = ["circuit-info-generator"]

[[bin]]
name = "zkmove"
path = "src/main.rs"

[[example]]
name = "circuit_info_gen"
required-features=["example"]

