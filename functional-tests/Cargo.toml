[package]
name = "functional-tests"
version = "0.3.0"
authors = [
    "Guangyu Zhu <guangyuz@gmail.com>",
    "Luxebeng <luxebeng@gmail.com>",
]
edition = "2018"

[dependencies]
logger = { path = "../common/logger" }
movelang = { path = "../movelang"}
vm-circuit = { path = "../vm-circuit" }
vm = { path = "../vm" }
halo2_proofs = { git = "https://github.com/privacy-scaling-explorations/halo2.git", tag = "v2023_02_02" }
anyhow = "1.0.38"
criterion = { git = "https://github.com/young-rocks/criterion.rs", rev="98922e676bacc55ed2a27f65dcd2b18650ba12e9" }
rand = "0.8"
move-core-types = { git = "https://github.com/young-rocks/move", rev = "b036995a" }

[dev-dependencies]
datatest-stable = "0.1.1"
regex = "1.5"
walkdir = "2.3.2"

[[test]]
name = "testsuite"
harness = false

[[bench]]
name = "circuit_benchmark"
harness = false

