[package]
name = "functional-tests"
version = "0.1.0"
authors = ["Guangyu Zhu <guangyuz@gmail.com>"]
edition = "2018"

[dependencies]
anyhow = "1.0.38"
criterion = "0.3.4"
logger = { path = "../common/logger" }
movelang = { path = "../movelang"}
rand_core = { version = "0.6", default-features = false }
vm-circuit = { path = "../vm-circuit" }
vm = { path = "../vm" }
proof-system = { path = "../proof-system" }

[dev-dependencies]
datatest-stable = "0.1.1"

[[test]]
name = "testsuite"
harness = false

[[bench]]
name = "circuit_benchmark"
harness = false

[features]
default = ["kzg"]
IPAs = []
kzg = []