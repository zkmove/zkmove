[package]
name = "confidential_asset"
version = "0.1.0"

[dependencies]
AptosFramework = { git = "https://github.com/zkmove/aptos-core.git", subdir = "aptos-move/framework/aptos-framework", rev = "main" }

verifier-api = { git = "https://github.com/zkmove/halo2-verifier.move.git", subdir = "packages/api", rev = "main" }
halo2-verifier =  { git = "https://github.com/zkmove/halo2-verifier.move.git", subdir = "packages/verifier", rev = "main" }

[addresses]
halo2_common = "_"
halo2_verifier = "_"
verifier_api = "_"
param_address = "_"
circuit_encrypt_address = "_"
circuit_check_sum_address = "_"
confidential_asset = "_"

[dev-addresses]
halo2_common = "0x123"
halo2_verifier="0x1234"
verifier_api = "0x12345"
param_address = "0xAB"
circuit_encrypt_address = "0xABCD"
circuit_check_sum_address = "0xABCDE"
confidential_asset = "0xCAFE"

[circuit]
max_poseidon_rows = 100
entry = { module_id = "0x2::off_chain", function_name = "encrypt" }

