[workspace]
members = [
    "movelang",
    "common/logger",
    "common/error",
#    "common/crypto",
    "common/types",
    "vm-circuit",
    "vm",
    "functional-tests",
    "cli",
]
resolver = "2"

[profile.dev]
opt-level = 3
debug = 2              # change to 0 or 2 for more or less debug info
overflow-checks = true
incremental = true

# Local "release" mode, more optimized than dev but faster to compile than release
[profile.local]
inherits = "dev"
opt-level = 3
# Set this to 1 or 2 to get more useful backtraces
debug = 1
debug-assertions = false
panic = 'unwind'
# better recompile times
incremental = true
lto = "thin"
codegen-units = 16

[profile.release]
opt-level = 3
debug = false
debug-assertions = false
lto = "fat"
# `codegen-units = 1` can lead to WORSE performance - always bench to find best profile for your machine!
# codegen-units = 1
panic = "unwind"
incremental = false

[profile.bench]
lto=true

[workspace.dependencies]
halo2-base = { git = "https://github.com/zkmove/halo2-lib", branch = "aggr", default-features=false, features=["halo2-pse","display"] }
snark-verifier-sdk = { git = "https://github.com/zkmove/snark-verifier", branch = "aggr" }
snark-verifier = { git = "https://github.com/zkmove/snark-verifier", branch = "aggr" }