[package]
name = "vm"
version = "0.1.0"
authors = [
    "Guangyu Zhu <guangyuz@gmail.com>",
    "Luxebeng <luxebeng@gmail.com>",
]
edition = "2018"

[dependencies]
error = { path = "../common/error" }
logger = { path = "../common/logger" }
vm-circuit = { path = "../vm-circuit" }
movelang = { path = "../movelang"}
move-binary-format = { git = "https://github.com/young-rocks/move", rev = "4e8d09188f056bf7a5daba4095c6c9bdcc51b74f" }
move-vm-types = { git = "https://github.com/young-rocks/move", rev = "4e8d09188f056bf7a5daba4095c6c9bdcc51b74f" }
move-vm-runtime = { git = "https://github.com/young-rocks/move", rev = "4e8d09188f056bf7a5daba4095c6c9bdcc51b74f" }
halo2_proofs = { git = "https://github.com/young-rocks/halo2", rev = "445a4e275d7f3088d48d1eb27ba177644b9aa550", default-features = false, features = ["dev-graph"] }
plotters = { version = "0.3.0" }
rand_core = { version = "0.6", default-features = false }

[dev-dependencies]
datatest-stable = "0.1.1"
