site_name: Document
site_description: Documentation for zkMove
site_url: https://zkmove.github.io/zkmove/
repo_url: https://github.com/zkmove/zkmove
repo_name: zkmove

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo1.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - navigation.sections
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
    - toc.follow

plugins:
  - search

nav:
  - Home: index.md
  - Litepaper:
      - Abstract: litepaper/abstract.md
      - Introduction: litepaper/introduction.md
      - ZKVM for Move: litepaper/zkvm-for-move.md
      - Architecture: litepaper/architecture.md
      - Circuit Design: litepaper/circuit-design.md
      - Performance: litepaper/performance.md
      - Use Cases: litepaper/use-cases.md
      - References: litepaper/references.md
  - User Guide:
      - Set Up the Development Environment: user/setup-dev-environment.md
      - Circuit and Proof: user/circuit-and-proof.md
      - Deploy an On-Chain Verifier: user/deploy-on-chain-verifier.md
      - Verify a Proof On-Chain: user/verify-proof-on-chain.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zkmove/zkmove
      name: zkMove on GitHub

extra_css:
  - stylesheets/custom.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
