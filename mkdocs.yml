site_name: zkMove Docs
site_description: Documentation for zkMove
site_url: https://zkmove.github.io/zkmove/
repo_url: https://github.com/zkmove/zkmove
repo_name: zkmove

theme:
  name: material
  custom_dir: overrides

plugins:
  - search

nav:
  - Home: index.md
  - Introduction:
      - Background: introduction/background.md
      - ZKVM for Move: introduction/zkvm-for-move.md
      - Architecture: introduction/architecture.md
      - Circuit Design: introduction/circuit-design.md
      - Performance: introduction/performance.md
      - Use Cases: introduction/use-cases.md
  - User Document:
      - Set Up the Development Environment: user/setup-dev-environment.md
      - Circuit and Proof: user/circuit-and-proof.md
      - Deploy an On-Chain Verifier: user/deploy-on-chain-verifier.md
      - Verify a Proof On-Chain: user/verify-proof-on-chain.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
